name: Backup Iryx Supabase

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Exportar tabelas do Supabase
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p backups
          DATE=$(date +%Y-%m-%d)
          echo $DATE > /tmp/backup_date.txt

          curl -sf "$SB_URL/rest/v1/iryx_transactions?order=date.asc&limit=9999"             -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY"             -o /tmp/tx.json

          curl -sf "$SB_URL/rest/v1/iryx_goals?order=created_at.asc"             -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY"             -o /tmp/goals.json

          curl -sf "$SB_URL/rest/v1/iryx_budgets"             -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY"             -o /tmp/budgets.json

          curl -sf "$SB_URL/rest/v1/iryx_clinicas?order=nome.asc"             -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY"             -o /tmp/clinicas.json

          curl -sf "$SB_URL/rest/v1/iryx_turnos?order=data.asc&limit=9999"             -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY"             -o /tmp/turnos.json

          python3 .github/scripts/merge_backup.py

      - name: Commit e push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch backups/unknown.json
          git add backups/
          if git diff --staged --quiet; then
            echo "Sem alteracoes."
          else
            git commit -m "backup: $(date +%Y-%m-%d)"
            git push
          fi
