name: Backup Iryx Supabase
on:
  schedule:
    - cron: '0 6 1 * *'   # todo dia 1 às 06h UTC
  workflow_dispatch:       # também permite rodar manualmente

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Exportar tabelas do Supabase
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          mkdir -p backups

          curl -s "$SB_URL/rest/v1/iryx_transactions?order=date.asc&limit=5000" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            -o /tmp/transactions.json

          curl -s "$SB_URL/rest/v1/iryx_goals?order=created_at.asc" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            -o /tmp/goals.json

          curl -s "$SB_URL/rest/v1/iryx_budgets" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            -o /tmp/budgets.json

          python3 -c "
          import json, datetime
          data = {
            'version': '2.1',
            'exported_at': '$DATE',
            'tables': {
              'iryx_transactions': json.load(open('/tmp/transactions.json')),
              'iryx_goals':        json.load(open('/tmp/goals.json')),
              'iryx_budgets':      json.load(open('/tmp/budgets.json')),
            }
          }
          json.dump(data, open('backups/$DATE.json', 'w'), ensure_ascii=False, indent=2)
          print(f'Backup: {len(data[\"tables\"][\"iryx_transactions\"])} transações')
          "

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "backup: $(date +%Y-%m-%d)"
          git push
